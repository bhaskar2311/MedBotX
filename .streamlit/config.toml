[browser]
gatherUsageStats = false

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[theme]
base = "dark"
primaryColor = "#3b82f6"
backgroundColor = "#0b0f1a"
secondaryBackgroundColor = "#111827"
textColor = "#e2e8f0"
